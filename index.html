<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A modern Trello-style Kanban board for managing tasks efficiently"
    />
    <title>Kanban Board | Task Manager</title>
    <link rel="icon" href="" />
    <!-- google fonts  -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- fontAwesome  -->
    <link
      rel="stylesheet"
      href="node_modules/@fortawesome/fontawesome-free/css/all.min.css"
    />
    <!-- tailwind  -->
    <link rel="stylesheet" href="dist/output.css" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
  </head>
  <body class="font-[Inter] min-h-screen">
    <div class="app min-h-screen flex flex-col">
      <!-- header  -->
      <header
        class="bg-linear-to-r from-indigo-600 to-purple-600 text-white sticky inset-0 z-40 shadow-md"
      >
        <div class="containerr py-3 flex items-center justify-between">
          <div class="flex items-center gap-3">
            <i class="fa-solid fa-table-columns text-2xl"></i>
            <h1 class="font-bold text-xl">Kanban</h1>
          </div>
          <div>
            <button
              id="addBtn"
              class="w-10 h-10 rounded-lg bg-white/20 hover:bg-white/30 transition flex items-center justify-center"
            >
              <i class="fa-solid fa-plus"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- overlay  -->
      <div
        id="overlay"
        class="fixed bg-black/50 inset-0 z-50 items-center justify-center px-4 hidden"
      >
        <div
          class="bg-white rounded-2xl absolute w-full max-w-lg max-h-[90vh] shadow-xl transition-all"
        >
          <!-- header  -->
          <div
            class="p-5 border-b border-slate-200 flex items-center justify-between"
          >
            <h2 class="font-semibold text-slate-800 text-lg">
              Create New Task
            </h2>
            <button
              id="closeBtn"
              class="w-8 h-8 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600 flex items-center justify-center transition-colors text-lg"
            >
              <i class="fa-solid fa-xmark"></i>
            </button>
          </div>

          <!-- inputs  -->
          <form id="form" class="p-5">
            <!-- title input  -->
            <div class="mb-4">
              <label
                for="title"
                class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2"
              >
                <i class="fa-solid fa-heading text-slate-400"></i>
                Task Title
                <span class="text-red-500">*</span>
              </label>
              <input
                type="text"
                name="title"
                id="title"
                placeholder="What needs to be done?"
                class="w-full px-4 py-3 border border-slate-300 rounded-lg transition-all placeholder:text-slate-400 focus:ring-indigo-500 focus:border-indigo-500 focus:ring-2 outline-none"
              />
              <p id="title-error" class="text-red-500 text-sm mt-1 hidden">
                Title must be at least 3 characters
              </p>
            </div>

            <!-- piority & date inputs -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <label
                  for="priority"
                  class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2"
                >
                  <i class="fa-solid fa-flag text-slate-400"></i>
                  <span>Priority</span>
                </label>
                <select
                  name="priority"
                  id="priority"
                  class="w-full px-4 py-3 border border-slate-300 rounded-lg transition-all focus:ring-indigo-500 focus:border-indigo-500 focus:ring-2 outline-none cursor-pointer"
                >
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
              <div>
                <label
                  for="date"
                  class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2"
                >
                  <i class="fa-regular fa-calendar text-slate-400"></i>
                  Due Data
                </label>
                <input
                  type="date"
                  name="date"
                  id="date"
                  class="w-full px-4 py-3 border border-slate-300 rounded-lg transition-all focus:ring-indigo-500 focus:border-indigo-500 focus:ring-2 outline-none"
                />
                <p id="date-error" class="text-red-500 text-sm mt-1 hidden">
                  Due date cannot be in the past
                </p>
              </div>
            </div>

            <!-- description input -->
            <div class="mb-5">
              <label
                for="description"
                class="flex items-center gap-2 text-sm font-medium text-slate-700 mb-2"
              >
                <i class="fa-solid fa-align-left text-slate-400"></i>
                Description
              </label>
              <textarea
                name="description"
                id="description"
                placeholder="Add more details about this task..."
                rows="3"
                class="w-full resize-none px-4 py-3 border border-slate-300 rounded-lg transition-all placeholder:text-slate-400 focus:ring-indigo-500 focus:border-indigo-500 focus:ring-2 outline-none"
              ></textarea>
              <div class="flex">
                <p id="char-count" class="text-slate-400 text-xs ml-auto">
                  0/500
                </p>
              </div>
            </div>

            <!-- buttons  -->
            <div class="grid grid-cols-2 gap-2">
              <button
                type="button"
                id="cancelBtn"
                class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium py-3 px-4 rounded-lg transition-all"
              >
                Cancel
              </button>
              <button
                type="submit"
                id="submitBtn"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition-all flex items-center justify-center gap-2"
              >
                <i class="fa-solid fa-plus"></i>
                <span id="submit-btn-text">Add Task</span>
              </button>
              <button
                type="button"
                id="saveBtn"
                class="hidden w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-4 rounded-lg transition-all items-center justify-center gap-2"
              >
                <i class="fa-solid fa-save"></i>
                <span id="submit-btn-text">Save Changes</span>
              </button>
            </div>
          </form>
        </div>
      </div>

      <!-- main Board  -->
      <main class="flex-1 py-9 bg-linear-to-r from-slate-100 to-slate-50">
        <div class="containerr grid grid-cols-1 md:grid-cols-3 gap-6">
          <!-- to do box  -->

          <div
            id="todoBox"
            class="box backdrop-blur-sm p-5 flex flex-col min-h-125 border border-slate-200 rounded-2xl shadow-sm bg-white"
          >
            <div class="flex items-center gap-3 mb-5">
              <div
                class="w-10 h-10 rounded-xl flex items-center justify-center bg-slate-200"
              >
                <i
                  class="fa-solid fa-clipboard-list text-slate-500 text-lg"
                ></i>
              </div>
              <div class="flex-1">
                <h2 class="font-semibold text-slate-800">To Do</h2>
                <p class="text-xs text-slate-400">0 tasks</p>
              </div>
            </div>

            <div id="ToDo"></div>
          </div>

          <!-- progress box  -->

          <div
            id="progressBox"
            class="box backdrop-blur-sm p-5 flex flex-col min-h-125 border border-slate-200 rounded-2xl shadow-sm bg-white"
          >
            <div class="flex items-center gap-3 mb-5">
              <div
                class="w-10 h-10 rounded-xl flex items-center justify-center bg-amber-50"
              >
                <i class="fa-solid fa-spinner text-amber-500 text-lg"></i>
              </div>
              <div class="flex-1">
                <h2 class="font-semibold text-slate-800">In Progress</h2>
                <p class="text-xs text-slate-400">0 tasks</p>
              </div>
            </div>

            <div id="InProgress"></div>
          </div>

          <!-- complete box  -->

          <div
            id="completeBox"
            class="box backdrop-blur-sm p-5 flex flex-col min-h-125 border border-slate-200 rounded-2xl shadow-sm bg-white"
          >
            <div class="flex items-center gap-3 mb-5">
              <div
                class="w-10 h-10 rounded-xl flex items-center justify-center bg-emerald-50"
              >
                <i
                  class="fa-solid fa-circle-check text-emerald-500 text-lg"
                ></i>
              </div>
              <div class="flex-1">
                <h2 class="font-semibold text-slate-800">Completed</h2>
                <p class="text-xs text-slate-400">0 tasks</p>
              </div>
            </div>

            <div id="Complete"></div>
          </div>
        </div>
      </main>

      <!-- footer  -->
      <footer
        class="bg-linear-to-r flex items-center justify-center from-slate-800 to to-slate-900 text-center py-5"
      >
        <p class="text-slate-400 text-sm">
          Made With
          <i class="fa-solid fa-heart text-rose-600 animate-pulse"></i> by Engy
          Mohamed
        </p>
      </footer>
    </div>

    <!-- script sheets  -->
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <script src="node_modules/@fortawesome/fontawesome-free/js/all.min.js"></script>
    <script type="module" src="src/js/index.js"></script>
  </body>
</html>
